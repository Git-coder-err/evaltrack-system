<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - EvalTrack</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .password-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h2 { text-align: center; color: #fff; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #eee; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: none; background: rgba(255,255,255,0.2); color: #fff; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; background: #6c5ce7; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #a29bfe; }
        #message { margin-top: 15px; text-align: center; }
        .success { color: #55efc4; }
        .error { color: #ff7675; }
    </style>
</head>
<body>
    <div class="password-container">
        <h2>Set New Password</h2>
        <p style="color: #ddd; text-align: center; font-size: 0.9em; margin-bottom: 20px;">For security, please change your password before continuing.</p>
        <form id="passwordForm">
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" required>
            </div>
            <button type="submit">Update Password</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const userData = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!userData || !userData.must_change_password) {
            window.location.href = 'login.html';
        }

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('new_password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            const msgDiv = document.getElementById('message');

            if (newPass !== confirmPass) {
                msgDiv.innerHTML = '<span class="error">Passwords do not match.</span>';
                return;
            }

            if (newPass.length < 6) {
                msgDiv.innerHTML = '<span class="error">Password must be at least 6 characters.</span>';
                return;
            }

            const formData = new FormData();
            formData.append('id', userData.id);
            formData.append('new_password', newPass);

            try {
                const response = await fetch('handle_password_change.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    msgDiv.innerHTML = '<span class="success">Password updated! Redirecting...</span>';
                    userData.must_change_password = false;
                    sessionStorage.setItem('currentUser', JSON.stringify(userData));
                    setTimeout(() => {
                        window.location.href = userData.role + '.html';
                    }, 2000);
                } else {
                    msgDiv.innerHTML = `<span class="error">${result.message}</span>`;
                }
            } catch (err) {
                msgDiv.innerHTML = '<span class="error">An error occurred.</span>';
            }
        });
    </script>
</body>
</html>
